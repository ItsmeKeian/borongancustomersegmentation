
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borongan City Customer Segmentation - Login</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/index.css">
    <link rel="icon" type="image/png" href="fav.png" />
</head>
<body>
    <!-- Login Page -->
    <div class="login-container">
        <div class="login-card card">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    
                    <i class="fas fa-chart-pie" style="font-size: 50px; color: lightblue;"></i>
                    <h3>Borongan Customer Segmentation</h3>
                    <p class="text-muted">Sign in to your account</p>
                </div>
                
                <div class="role-selector">
                    <button type="button" class="role-btn active" id="establishmentBtn">Establishment</button>
                    <button type="button" class="role-btn" id="adminBtn">System Admin <span class="admin-badge">Team</span></button>
                </div>
                
                <!-- Establishment Login Form -->
                <form id="establishmentLogin" class="login-form">
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="text" id="username" name="username" class="form-control" placeholder="Enter your email">
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password">
        </div>
        
        <button type="button" class="btn btn-primary w-100 mb-3" onclick="login('establishment')">Sign in</button>
        <div class="text-center">
                        <a href="#" data-bs-toggle="modal" data-bs-target="#forgotPasswordModal">Forgot Password?</a>
                    </div>
    </form>


                
                <!-- Admin Login Form -->
                         <form id="adminLogin" class="login-form" style="display: none;">
    <div class="mb-3">
        <label class="form-label">Admin Username</label>
        <input type="text" id="admin_username" name="username" class="form-control" placeholder="Enter admin username">
    </div>
    <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" id="admin_password" name="password" class="form-control" placeholder="Enter your password">
    </div>
    
    <button type="button" class="btn btn-primary w-100 mb-3" onclick="login('admin')">Sign in as Admin</button>
    <div class="text-center">
                      
                    </div>
</form>


            </div>
        </div>
    </div>


        <div class="modal fade" id="forgotPasswordModal" tabindex="-1" aria-labelledby="forgotPasswordLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title" id="forgotPasswordLabel">Forgot Password</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="forgotPasswordForm">
          <div class="mb-3">
            <label for="resetEmail" class="form-label">Enter your email address</label>
            <input type="email" class="form-control" id="resetEmail" name="resetEmail" placeholder="you@example.com" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
        </form>
        <div id="forgotPasswordMessage" class="mt-3 text-center"></div>
      </div>
    </div>
  </div>
</div>



    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/index.js"></script>
    
    <script>

   $(document).ready(function() {
    // Handle forgot password form submission
    $("#forgotPasswordForm").submit(function(e) {
        e.preventDefault();
        let email = $("#resetEmail").val();

        $.ajax({
            url: "php/send_reset_link.php",
            type: "POST",
            data: { email: email },
            dataType: "json",
            success: function(response) {
                if (response.status === 1) {
                    $("#forgotPasswordMessage").html(
                        '<div class="alert alert-success">' + response.message + '</div>'
                    );
                    $("#forgotPasswordForm")[0].reset();
                } else {
                    $("#forgotPasswordMessage").html(
                        '<div class="alert alert-danger">' + response.message + '</div>'
                    );
                }
            },
            error: function() {
                $("#forgotPasswordMessage").html(
                    '<div class="alert alert-danger">An error occurred. Please try again later.</div>'
                );
            }
        });
    });
});







         
function login(role) {
    let username, password;

    // Get username and password based on role
    if (role === 'establishment') {
        username = $("#username").val();
        password = $("#password").val();
    } else if (role === 'admin') {
        username = $("#admin_username").val();
        password = $("#admin_password").val();
    }

    // Check if username and password are not empty
    if (!username || !password) {
        Swal.fire({
            icon: 'warning',
            title: 'Missing Fields',
            text: 'Please fill in all fields.',
            toast: true,
            position: 'top-center',
            showConfirmButton: false,
            timer: 2000,
            timerProgressBar: true
        });
        return;
    }

    // Sending AJAX request to check user credentials
    $.ajax({
        url: 'php/checkuser.php',
        type: 'POST',
        data: {
            un: username,
            pw: password,
            loginType: role   // Send role (admin or establishment)
        },
        dataType: 'json',
        success: function(result) {
            console.log("Login response:", result); // Debugging line
            if (result.status === 1) {
                // Success - Show a toast notification
                Swal.fire({
                    toast: true,
                    position: 'center',
                    icon: 'success',
                    title: 'Login successful!',
                    showConfirmButton: false,
                    timer: 1000,
                    timerProgressBar: true
                }).then(() => {
                    // Redirect to dashboard based on role
                    if (result.role === "Admin") {
                        window.location = "admindashboard.php";
                    } else if (result.role === "Establishment") {
                        window.location = "establishment_dashboard.php";
                    } else {
                        Swal.fire({
                            icon: 'error',
                            title: 'Unknown Role',
                            text: 'Please contact support.',
                            toast: true,
                            position: 'center',
                            showConfirmButton: false,
                            timer: 1500,
                            timerProgressBar: true
                        });
                    }
                });
            } else {
                // Error - Show toast notification with error message
                Swal.fire({
                    toast: true,
                    position: 'center',
                    icon: 'error',
                    title: result.msg || "Login failed. Please try again.",
                    showConfirmButton: false,
                    timer: 1000,
                    timerProgressBar: true
                });
            }
        },
        error: function(xhr, status, error) {
            console.error(xhr.responseText);
            Swal.fire({
                toast: true,
                position: 'center',
                icon: 'error',
                title: "An error occurred: " + error,
                showConfirmButton: false,
                timer: 1500,
                timerProgressBar: true
            });
        }
    });
}




    </script>
</body>
</html>
